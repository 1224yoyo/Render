<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>登入</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="container">
    <h2>登入</h2>

    <input type="text" id="username" name="username"required>
    <input type="password" id="password" name="password" required>
    <button onclick="check()">登入</button>
    

    <!-- 重點在這 -->
    <p class="register-text">
        還沒有帳號？
        <a href="javascript:register()">註冊帳號</a>
    </p>
    <p id="login_text"></p>

</div>

</body>

<script>
    //檢查是否正確
    async function check(){
        let p=document.getElementById("login_text")
        name=document.getElementById("username").value
        password=document.getElementById("password").value
        if (name!="" && password!=""){
        const url = `https://render-ihb5.onrender.com/?name=${name}&password=${password}`;
        const response = await fetch(url); // 發出請求
        const data = await response.json(); // 解析 Flask 回傳的 JSON
        if(data.data==="password no True")p.textContent="密碼錯誤"
        else if(data.data==="no find User")p.textContent="名字錯誤"
        else{}
        }
    }
    async function register(){
        console.log("111")
    }
</script>

</html>
