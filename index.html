<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>登入</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>登入</h2>

    <input type="text" id="username" name="username"required>
    <input type="password" id="password" name="password" required>
    <button onclick="log_in()">登入</button>
    

    <!-- 重點在這 -->
    <p class="register-text">
        還沒有帳號？
        <a href="/register">註冊帳號</a>
    </p>

</div>

</body>

<script>
    async function log_in(){
        name=document.getElementById("username").value
        password=document.getElementById("password").value
        if(await check(name,password)){console.log("通過")}else{console.log("不通過")}
    }
    async function check(name,password){
        if (name!="" && password!=""){
        const url = `https://render-ihb5.onrender.com/?name=${name}&password=${password}`;
        const response = await fetch(url); // 發出請求
        const data = await response.json(); // 解析 Flask 回傳的 JSON
        }
        if(data.data="password no True")console.log("密碼錯誤")
        if(data.data="no find User")console.log("名字錯誤")
        else{console.log("通過")}
    }
</script>

</html>
